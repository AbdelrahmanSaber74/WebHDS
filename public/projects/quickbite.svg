      <text x="80" y="320" fill="#aa7c7c" font-family="system-ui" font-size="12">1 Item • Delivery: 9 mins</text>
      <rect x="350" y="288" width="80" height="24" rx="12" fill="#10b981" opacity="0.3"/>
      <text x="390" y="304" fill="#10b981" font-family="system-ui" font-size="11" font-weight="bold" text-anchor="middle">DELIVERED</text>

      <rect x="55" y="360" width="400" height="70" rx="8" fill="#3d1d1d"/>
