      <text x="80" y="410" fill="#aa7c7c" font-family="system-ui" font-size="12">4 Items • Delivery: 22 mins</text>
      <rect x="350" y="378" width="80" height="24" rx="12" fill="#ef4444" opacity="0.3"/>
      <text x="390" y="394" fill="#ef4444" font-family="system-ui" font-size="11" font-weight="bold" text-anchor="middle">DISPATCHED</text>

      <!-- Right statistics -->
      <rect x="550" y="100" width="220" height="370" rx="8" fill="#2c1313"/>
      <text x="575" y="145" fill="#aa7c7c" font-family="system-ui" font-size="12" font-weight="bold" letter-spacing="1">SPEED DELIVERY</text>
      <text x="575" y="200" fill="#f43f5e" font-family="system-ui" font-size="48" font-weight="bold">19%</text>
