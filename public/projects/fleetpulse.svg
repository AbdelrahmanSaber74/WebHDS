<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
      <rect width="800" height="500" fill="#091410"/>
      <!-- Header -->
      <rect x="30" y="30" width="740" height="50" rx="8" fill="#11241d"/>
      <circle cx="60" cy="55" r="8" fill="#ff5f56"/>
      <circle cx="85" cy="55" r="8" fill="#ffbd2e"/>
      <circle cx="110" cy="55" r="8" fill="#27c93f"/>
      <text x="140" y="61" fill="#749688" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">FleetPulse Real-time Telematics</text>
      
      <!-- Live Map Dashboard layout -->
      <rect x="30" y="100" width="500" height="370" rx="8" fill="#11241d"/>
      <!-- Map grids -->
      <line x1="30" y1="200" x2="530" y2="200" stroke="#1d3d31" stroke-width="1"/>
      <line x1="30" y1="300" x2="530" y2="300" stroke="#1d3d31" stroke-width="1"/>
      <line x1="30" y1="400" x2="530" y2="400" stroke="#1d3d31" stroke-width="1"/>
      <line x1="150" y1="100" x2="150" y2="470" stroke="#1d3d31" stroke-width="1"/>
      <line x1="270" y1="100" x2="270" y2="470" stroke="#1d3d31" stroke-width="1"/>
      <line x1="390" y1="100" x2="390" y2="470" stroke="#1d3d31" stroke-width="1"/>
      
      <!-- Route path mapping -->
      <path d="M 80 430 L 210 380 L 240 220 L 450 180" fill="none" stroke="url(#fleetpulseGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="80" cy="430" r="10" fill="#27c93f"/>
      <circle cx="450" cy="180" r="10" fill="#ff5f56"/>
      <circle cx="240" cy="220" r="6" fill="#ffffff" stroke="#091410" stroke-width="2"/>
      
      <!-- Right Side metrics -->
      <rect x="550" y="100" width="220" height="170" rx="8" fill="#11241d"/>
      <text x="575" y="135" fill="#749688" font-family="system-ui" font-size="12" font-weight="bold" letter-spacing="1">ROUTE EFFICIENCY</text>
      <text x="575" y="195" fill="#27c93f" font-family="system-ui" font-size="48" font-weight="bold">96%</text>
      <path d="M 575 240 L 745 240" stroke="#1d3d31" stroke-width="2"/>
      <text x="575" y="258" fill="#749688" font-family="system-ui" font-size="12">18% Cost reduction</text>
      
      <rect x="550" y="290" width="220" height="180" rx="8" fill="#11241d"/>
      <text x="575" y="325" fill="#749688" font-family="system-ui" font-size="12" font-weight="bold" letter-spacing="1">ACTIVE VEHICLES</text>
      <text x="575" y="385" fill="#00f2fe" font-family="system-ui" font-size="48" font-weight="bold">1,482</text>
      <path d="M 575 430 L 745 430" stroke="#1d3d31" stroke-width="2"/>
      <text x="575" y="448" fill="#27c93f" font-family="system-ui" font-size="12">All systems normal</text>

      <defs>
        <linearGradient id="fleetpulseGrad" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#27c93f" />
          <stop offset="100%" stop-color="#00f2fe" />
        </linearGradient>
      </defs>
    </svg>